[alembic]
script_location = %(here)s/alembic
# R5 decision: first SQL migration target is PostgreSQL.
# File-backed stores remain the Alpha default until SQL adapters land.
sqlalchemy.url = postgresql+psycopg://cosi:cosi@localhost:5439/cosi

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
